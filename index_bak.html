</head>

    <div class="flex h-full w-full">

        <aside class="w-80 h-full bg-white border-r border-slate-200 flex flex-col z-50">
            <div class="p-8 border-b border-slate-50">

            <div class="flex-1 overflow-y-auto p-6 space-y-6 custom-scrollbar">

                    <label class="text-[12px] font-black text-slate-400 tracking-wider">基本設定 <span class="text-[9px] text-slate-300 font-bold block">Base Setting</span></label>
                    <select id="compareModeSelect" onchange="onCompareModeChange()" class="w-full p-3 bg-amber-500 text-white border border-amber-400 rounded-xl font-black outline-none cursor-pointer text-sm shadow-lg shadow-amber-500/20">

            <div class="p-4 border-t border-slate-50 bg-slate-50/20 text-center">

                    <div class="overflow-x-auto custom-scrollbar">

        <!-- List Selector Modal -->

                    <h3 id="picker-title" class="text-3xl font-black text-slate-800 tracking-tighter">選択リスト</h3>
                    <button onclick="closePicker()" class="w-12 h-12 flex items-center justify-center hover:bg-slate-50 rounded-full text-slate-300"><i data-lucide="x" class="w-8 h-8"></i></button>
                </div>
                <input type="text" id="picker-search" oninput="filterPicker()" placeholder="名前で絞り込む..." class="w-full bg-slate-50 border border-slate-100 rounded-2xl py-4 px-12 text-sm font-bold outline-none mb-6">

                <div class="flex gap-3">
                    <button onclick="selectAll()" class="flex-1 py-4 bg-slate-50 hover:bg-slate-100 rounded-2xl text-sm font-black">すべて選択 <span class="text-[10px] text-slate-400 block font-medium uppercase tracking-wider mt-0.5">Select All</span></button>
                    <button onclick="clearAll()" class="flex-1 py-4 bg-slate-50 hover:bg-slate-100 rounded-2xl text-sm font-black text-red-400">すべて解除 <span class="text-[10px] text-red-300 block font-medium uppercase tracking-wider mt-0.5">Clear All</span></button>
                    <button onclick="applySelection()" class="flex-[2] py-4 bg-primary text-white rounded-2xl text-sm font-black shadow-xl shadow-primary/20">選択を適用する <span class="text-[10px] text-emerald-100 block font-medium uppercase tracking-wider mt-0.5">Apply & Update</span></button>
                </div>

    <script>
        const PROJECT_ID = "cominet-8799b", DATABASE_ID = "cominets";
        const BASE_URL = "https://firestore.googleapis.com/v1/projects/" + PROJECT_ID + "/databases/" + DATABASE_ID + "/documents";
        let DATA_MATRIX = { branches: [], routes: [], classes: [], timeline: [], results: {} };
        let chart = null;
        let selection = { metric: "売上", branches: [], routes: [], categories: [], granularity: "month", displayMode: "aggregated", startDate: "", endDate: "", unit: 1, compareMode: "normal", startDateA: "2025-04-01", endDateA: "2026-03-31", startDateB: "2023-04-01", endDateB: "2024-03-31" };
        let activePicker = null, pickerItems = [], tempSelected = [];

        // Universal Fetch with Timeout (Old-school approach for max compatibility)
        function fetchWithTimeout(url, timeout = 10000) {
            return new Promise((resolve, reject) => {
                const timer = setTimeout(() => reject(new Error('Timeout')), timeout);
                fetch(url).then(res => { clearTimeout(timer); resolve(res); }).catch(e => { clearTimeout(timer); reject(e); });
            });
        }

        async function init() {
            const status = document.getElementById('path-indicator');
            setTimeout(hideLoading, 6000);

            try {
                const res = await fetchWithTimeout(BASE_URL + "/dashboard_metadata/current");
                const data = await res.json();
                if (!data.fields) throw new Error("Metadata empty");
                
                const meta = fromFirestoreValue({ mapValue: { fields: data.fields } });
                DATA_MATRIX.branches = meta.branches || [];
                DATA_MATRIX.routes = meta.routes || [];
                DATA_MATRIX.classes = meta.classes || [];
                DATA_MATRIX.timeline = meta.timeline || [];
                
                const kanagawa = DATA_MATRIX.branches.find(b => b.indexOf("神奈川支社") !== -1);
                selection.branches = [kanagawa || DATA_MATRIX.branches[0] || "未選択"];
                selection.routes = [DATA_MATRIX.routes[0] || "未選択"];
                selection.categories = [DATA_MATRIX.classes[0] || "未選択"];
                
                if (DATA_MATRIX.timeline.length > 0) {
                    selection.startDate = "2025-04-01";
                    selection.endDate = "2026-03-31";
                    document.getElementById('start-date').value = selection.startDate;
                    document.getElementById('end-date').value = selection.endDate;
                }
                update();
                hideLoading();
            } catch (e) {
                console.error(e);
                alert("初期設定に失敗しました。再読み込みしてください。");
                hideLoading();
            }
        }

        function hideLoading() {
            const overlay = document.getElementById('loading-overlay');
            if(overlay) overlay.style.opacity = '0';
            setTimeout(() => { if(overlay) overlay.style.display = 'none'; }, 400);
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        function fromFirestoreValue(v) {
            if (!v) return null;
            if (v.stringValue !== undefined) return v.stringValue;
            if (v.integerValue !== undefined) return parseInt(v.integerValue);
            if (v.doubleValue !== undefined) return parseFloat(v.doubleValue);
            if (v.arrayValue) return v.arrayValue.values ? v.arrayValue.values.map(fromFirestoreValue) : [];
            if (v.mapValue) {
                let res = {}; for (let k in v.mapValue.fields) res[k] = fromFirestoreValue(v.mapValue.fields[k]);
                return res;
            }
            return null;
        }

        async function fetchAggregatedData() {
            const { metric, branches, routes, categories } = selection;
            const loader = document.getElementById('fetch-loader');
            if(loader) loader.style.display = 'flex';

            let combinedC = [], combinedP = [];
            const patterns = [];
            for (let i = 0; i < branches.length; i++) {
                if (!branches[i] || branches[i] === "未選択") continue;
                for (let j = 0; j < routes.length; j++) {
                    for (let k = 0; k < categories.length; k++) {
                        patterns.push({ b: branches[i], r: routes[j], c: categories[k] });
                    }
                }
            }

            const details = [];
            try {
                const results = [];
                for (let i = 0; i < patterns.length; i += 10) {
                    const chunk = patterns.slice(i, i + 10);
                    const chunkRes = await Promise.all(chunk.map(async p => {
                        const cacheKey = metric + "_" + p.b + "_" + p.r + "_" + p.c;
                        if (DATA_MATRIX.results[cacheKey]) return { p, data: DATA_MATRIX.results[cacheKey] };
                        const doc_id = (metric + "_" + p.r + "_" + p.c).replace(/\//g, "-").replace(/\s/g, "");
                        const url = BASE_URL + "/dashboard_data/" + encodeURIComponent(doc_id) + "/branches/" + encodeURIComponent(p.b);
                        try {
                            const res = await fetchWithTimeout(url, 15000);
                            if (!res.ok) return null;
                            const d = await res.json();
                            const f = d.fields || {};
                            const resObj = { c: (fromFirestoreValue(f.c)||[]).concat(fromFirestoreValue(f.c_ext)||[]), p: (fromFirestoreValue(f.p)||[]).concat(fromFirestoreValue(f.p_ext)||[]) };
                            DATA_MATRIX.results[cacheKey] = resObj;
                            return { p, data: resObj };
                        } catch (e) { console.error("Fetch failed", e); return null; }
                    }));
                    results.push(...chunkRes);
                }

                for (let i = 0; i < results.length; i++) {
                    if (!results[i]) continue;
                    const resObj = results[i].data;
                    details.push({
                        label: `${results[i].p.b} / ${results[i].p.r} / ${results[i].p.c}`,
                        c: resObj.c,
                        p: resObj.p
                    });
                    if (combinedC.length === 0) {
                        combinedC = resObj.c.slice(); combinedP = resObj.p.slice();
                    } else {
                        for(let j=0; j<resObj.c.length; j++) {
                            if(combinedC[j] !== undefined) combinedC[j] += (resObj.c[j] || 0);
                            if(combinedP[j] !== undefined) combinedP[j] += (resObj.p[j] || 0);
                        }
                    }
                }
                return { c: combinedC, p: combinedP, details: details };
            } finally { if(loader) loader.style.display = 'none'; }
        }

        async function update() {
            if (selection.compareMode === 'period') {
                return updateCompare();
            }
            const tl = DATA_MATRIX.timeline || [];
            const sVal = document.getElementById('start-date').value;
            const eVal = document.getElementById('end-date').value;
            selection.startDate = sVal;
            selection.endDate = eVal;
            
            let sIdx = 0, eIdx = tl.length - 1;
            for(let i=0; i<tl.length; i++) { if(tl[i] >= sVal) { sIdx = i; break; } }
            for(let i=tl.length-1; i>=0; i--) { if(tl[i] <= eVal) { eIdx = i; break; } }
            if (sIdx > eIdx) eIdx = sIdx;
            
            const sliced = tl.slice(sIdx, eIdx + 1);
            const labels = aggregateLabels(sliced, selection.granularity);
            
            const dat = await fetchAggregatedData();
            const datasets = [];
            const tableDatasets = [];
            
            const customLegend = document.getElementById('chart-legend');
            if (customLegend) customLegend.style.display = selection.displayMode === 'detailed' ? 'none' : 'flex';

            if (dat) {
                const cAgg = aggregate(sliced, dat.c.slice(sIdx, eIdx + 1), selection.granularity).map(v => v / selection.unit);
                const pAgg = aggregate(sliced, dat.p.slice(sIdx, eIdx + 1), selection.granularity).map(v => v / selection.unit);
                
                if (selection.displayMode === 'aggregated') {
                    datasets.push({ label: '当年 (合算)', data: cAgg, borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.05)', fill: true, tension: 0.4, borderWidth: 3 });
                    datasets.push({ label: '前年 (合算)', data: pAgg, borderColor: '#cbd5e1', borderDash: [5,5], fill: false, tension: 0.4, borderWidth: 2 });
                }

                const colors = ['#f43f5e', '#8b5cf6', '#3b82f6', '#10b981', '#f59e0b', '#ec4899', '#06b6d4', '#6366f1', '#14b8a6', '#f97316', '#84cc16', '#eab308'];

                for(let i=0; i<dat.details.length; i++) {
                    const d = dat.details[i];
                    const detailCAgg = aggregate(sliced, d.c.slice(sIdx, eIdx + 1), selection.granularity).map(v => v / selection.unit);
                    const detailPAgg = aggregate(sliced, d.p.slice(sIdx, eIdx + 1), selection.granularity).map(v => v / selection.unit);
                    
                    const hasC = detailCAgg.some(v => v !== 0);
                    const hasP = detailPAgg.some(v => v !== 0);
                    
                    if (hasC || hasP) {
                        if (hasC) tableDatasets.push({ label: d.label + " (当年)", data: detailCAgg, isTotal: false });
                        if (hasP) tableDatasets.push({ label: d.label + " (前年)", data: detailPAgg, isTotal: false });

                            if (hasP) datasets.push({ label: d.label + " (前年)", data: detailPAgg, borderColor: cColor, borderDash: [5,5], fill: false, tension: 0.4, borderWidth: 1.5, hidden: true });

                    }
                }
                
                tableDatasets.push({ label: '【合算】当年', data: cAgg, isTotal: true });

                const pAgg = aggregate(sliced, dat.p.slice(sIdx, eIdx + 1), selection.granularity).map(v => v / selection.unit);

            } else {

            document.getElementById('path-indicator').textContent = selection.branches.length + " 支社 / " + selection.routes.length + " ルート";

            renderChips('route', selection.routes);

        // ====== Period Comparison Mode ======
        async function updateCompare() {
            const tl = DATA_MATRIX.timeline || [];
            const sA = document.getElementById('compare-start-a').value;
            const eA = document.getElementById('compare-end-a').value;
            const sB = document.getElementById('compare-start-b').value;
            const eB = document.getElementById('compare-end-b').value;
            if (!sA || !eA || !sB || !eB) return;

            // Sync values to selection object
            selection.startDateA = sA;
            selection.endDateA = eA;
            selection.startDateB = sB;
            selection.endDateB = eB;

            // Find index ranges for Period A and Period B
            let sIdxA = 0, eIdxA = tl.length - 1;
            for(let i=0; i<tl.length; i++) { if(tl[i] >= sA) { sIdxA = i; break; } }
            for(let i=tl.length-1; i>=0; i--) { if(tl[i] <= eA) { eIdxA = i; break; } }
            if (sIdxA > eIdxA) eIdxA = sIdxA;

            let sIdxB = 0, eIdxB = tl.length - 1;
            for(let i=0; i<tl.length; i++) { if(tl[i] >= sB) { sIdxB = i; break; } }
            for(let i=tl.length-1; i>=0; i--) { if(tl[i] <= eB) { eIdxB = i; break; } }
            if (sIdxB > eIdxB) eIdxB = sIdxB;

            const slicedA = tl.slice(sIdxA, eIdxA + 1);
            const slicedB = tl.slice(sIdxB, eIdxB + 1);

            // Build labels: use relative month labels (4月, 5月, ...) for alignment
            const labelsA = aggregateLabels(slicedA, selection.granularity);
            const labelsB = aggregateLabels(slicedB, selection.granularity);

            // Create aligned labels: use period A's month count as reference
            // For display, show relative month labels
            const yearA = sA.substring(0, 4);
            const yearB = sB.substring(0, 4);
            const labelTextA = sA.substring(0,7) + '～' + eA.substring(0,7);
            const labelTextB = sB.substring(0,7) + '～' + eB.substring(0,7);

            const dat = await fetchAggregatedData();
            const datasets = [];
            const tableDatasets = [];

            const customLegend = document.getElementById('chart-legend');
            if (customLegend) {
                customLegend.style.display = 'flex';
                customLegend.innerHTML = `
                    <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-emerald-500"></div><span class="text-xs font-black text-slate-600">期間A (${labelTextA})</span></div>
                    <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-blue-400"></div><span class="text-xs font-black text-slate-600">期間B (${labelTextB})</span></div>
                `;
            }

            if (dat) {
                // Period A: use 'c' array data
                const aAgg = aggregate(slicedA, dat.c.slice(sIdxA, eIdxA + 1), selection.granularity).map(v => v / selection.unit);
                // Period B: use 'c' array data
                const bAgg = aggregate(slicedB, dat.c.slice(sIdxB, eIdxB + 1), selection.granularity).map(v => v / selection.unit);

                // Use the longer label set, pad the shorter one
                const maxLen = Math.max(labelsA.length, labelsB.length);
                const displayLabels = [];
                for (let i = 0; i < maxLen; i++) {
                    displayLabels.push(labelsA[i] || labelsB[i] || (i + 1) + '期');
                }
                while (aAgg.length < maxLen) aAgg.push(0);
                while (bAgg.length < maxLen) bAgg.push(0);

                datasets.push({ label: '期間A (' + labelTextA + ')', data: aAgg, borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.05)', fill: true, tension: 0.4, borderWidth: 3 });
                datasets.push({ label: '期間B (' + labelTextB + ')', data: bAgg, borderColor: '#60a5fa', backgroundColor: 'rgba(96, 165, 250, 0.05)', fill: true, tension: 0.4, borderWidth: 3, borderDash: [5,5] });

                // Detail datasets for table (each combination)
                const colors = ['#f43f5e', '#8b5cf6', '#3b82f6', '#10b981', '#f59e0b', '#ec4899', '#06b6d4', '#6366f1', '#14b8a6', '#f97316', '#84cc16', '#eab308'];
                for(let i=0; i<dat.details.length; i++) {
                    const d = dat.details[i];
                    const detailAAgg = aggregate(slicedA, d.c.slice(sIdxA, eIdxA + 1), selection.granularity).map(v => v / selection.unit);
                    const detailBAgg = aggregate(slicedB, d.c.slice(sIdxB, eIdxB + 1), selection.granularity).map(v => v / selection.unit);
                    while (detailAAgg.length < maxLen) detailAAgg.push(0);
                    while (detailBAgg.length < maxLen) detailBAgg.push(0);
                    const hasA = detailAAgg.some(v => v !== 0);
                    const hasB = detailBAgg.some(v => v !== 0);
                    if (hasA || hasB) {
                        if (hasA) tableDatasets.push({ label: d.label + ' (期間A)', data: detailAAgg, isTotal: false });
                        if (hasB) tableDatasets.push({ label: d.label + ' (期間B)', data: detailBAgg, isTotal: false });

                        if (selection.displayMode === 'detailed') {
                            const cColor = colors[i % colors.length];
                            if (hasA) datasets.push({ label: d.label + ' (期間A)', data: detailAAgg, borderColor: cColor, fill: false, tension: 0.4, borderWidth: 2 });
                            if (hasB) datasets.push({ label: d.label + ' (期間B)', data: detailBAgg, borderColor: cColor, borderDash: [5,5], fill: false, tension: 0.4, borderWidth: 1.5, hidden: true });
                        }
                    }
                }

                tableDatasets.push({ label: '【合算】期間A (' + labelTextA + ')', data: aAgg, isTotal: true });
                tableDatasets.push({ label: '【合算】期間B (' + labelTextB + ')', data: bAgg, isTotal: true });
                // Add diff row
                const diffRow = displayLabels.map((_, idx) => aAgg[idx] - bAgg[idx]);
                tableDatasets.push({ label: '【差額】(A - B)', data: diffRow, isTotal: true });
                // Add ratio row
                const ratioRow = displayLabels.map((_, idx) => bAgg[idx] > 0 ? ((aAgg[idx] / bAgg[idx]) * 100) : 0);
                tableDatasets.push({ label: '【比率】(A / B %)', data: ratioRow, isTotal: true, isRatio: true });

                renderChart(displayLabels, datasets.slice(0, selection.displayMode === 'detailed' ? undefined : 2));
                renderTable(displayLabels, tableDatasets);
                updateCompareAIAnalysis(displayLabels, aAgg, bAgg, labelTextA, labelTextB, dat.details, sIdxA, eIdxA, sIdxB, eIdxB, slicedA, slicedB);
            } else {
                renderChart([], []); renderTable([], []);
                updateAIAnalysis([], [], [], [], 0, 0, []);
            }
            document.getElementById('path-indicator').textContent = '📊 期間比較: ' + labelTextA + ' vs ' + labelTextB;
            renderChips('branch', selection.branches);
            renderChips('route', selection.routes);
            renderChips('category', selection.categories);
        }

        function updateCompareAIAnalysis(labels, aAgg, bAgg, labelA, labelB, details, sIdxA, eIdxA, sIdxB, eIdxB, slicedA, slicedB) {
            const container = document.getElementById('ai-analysis-content');
            if (!container) return;

            const hasData = aAgg.some(v => v !== 0) || bAgg.some(v => v !== 0);
            const card = document.getElementById('ai-analysis-card');
            if (!hasData) { if (card) card.style.display = 'none'; return; }
            if (card) card.style.display = 'block';

            const aTotal = aAgg.reduce((s, v) => s + v, 0);
            const bTotal = bAgg.reduce((s, v) => s + v, 0);
            const diff = aTotal - bTotal;
            const ratio = bTotal > 0 ? (aTotal / bTotal) * 100 : 0;
            const metric = selection.metric;
            const unitText = selection.unit === 0.001 ? '円' : (selection.unit === 1 ? '千円' : (selection.unit === 10 ? '万円' : '百万円'));

            let maxGrowthRatio = -Infinity, maxGrowthLabel = '';
            let maxDeclineRatio = Infinity, maxDeclineLabel = '';
            let anomalyMonths = [];
            for (let i = 0; i < labels.length; i++) {
                if (bAgg[i] > 0) {
                    const r = (aAgg[i] / bAgg[i]) * 100;
                    if (r > maxGrowthRatio) { maxGrowthRatio = r; maxGrowthLabel = labels[i]; }
                    if (r < maxDeclineRatio) { maxDeclineRatio = r; maxDeclineLabel = labels[i]; }
                    if (r < 80) anomalyMonths.push({ label: labels[i], ratio: r, status: 'decline' });
                    else if (r > 120) anomalyMonths.push({ label: labels[i], ratio: r, status: 'growth' });
                }
            }

            const recentLen = Math.min(3, labels.length);
            let trendText = '';
            if (recentLen > 0) {
                let gCnt = 0, dCnt = 0;
                for (let i = labels.length - recentLen; i < labels.length; i++) {
                    if (aAgg[i] > bAgg[i]) gCnt++; else if (aAgg[i] < bAgg[i]) dCnt++;
                }
                if (gCnt === recentLen) trendText = `直近${recentLen}期間は連続して期間Aが期間Bを上回り、堅調に成長しています。`;
                else if (dCnt === recentLen) trendText = `直近${recentLen}期間は連続して期間Aが期間Bを下回り、減少傾向が見られます。`;
                else trendText = `直近の推移は期間Aと期間Bが拮抗しており、一進一退の動きです。`;
            }

            let html = `<div class="grid grid-cols-1 md:grid-cols-2 gap-6">`;
            html += `<div class="space-y-3">`;
            html += `<h4 class="text-[11px] font-black text-slate-400 uppercase tracking-wider">Period Comparison | 期間比較概況</h4>`;
            html += `<p class="text-xs text-slate-700"><strong>期間A</strong>（${labelA}）の${metric}累計は <strong>${aTotal.toLocaleString(undefined, {maximumFractionDigits:1})} ${unitText}</strong>、<strong>期間B</strong>（${labelB}）は <strong>${bTotal.toLocaleString(undefined, {maximumFractionDigits:1})} ${unitText}</strong> です。</p>`;
            html += `<p class="text-xs text-slate-700">期間Aは期間Bに対し <strong>${ratio.toFixed(1)}%</strong>（差額: ${diff >= 0 ? '+' : ''}${diff.toLocaleString(undefined, {maximumFractionDigits:1})} ${unitText}）で推移しています。</p>`;
            html += `<p class="text-xs text-slate-600">${trendText}</p>`;
            html += `</div>`;

            html += `<div class="space-y-3">`;
            html += `<h4 class="text-[11px] font-black text-slate-400 uppercase tracking-wider">Key Indicators | 特異点</h4>`;
            let keyPts = [];
            if (maxGrowthRatio > -Infinity && maxGrowthRatio > 100) keyPts.push(`最も伸長: <strong>${maxGrowthLabel}</strong>（${maxGrowthRatio.toFixed(1)}%）`);
            if (maxDeclineRatio < Infinity && maxDeclineRatio < 100) keyPts.push(`最も落込: <strong>${maxDeclineLabel}</strong>（${maxDeclineRatio.toFixed(1)}%）`);
            if (keyPts.length > 0) html += `<p class="text-xs text-slate-700">${keyPts.join('<br>')}</p>`;

            if (anomalyMonths.length > 0) {
                const dec = anomalyMonths.filter(m => m.status === 'decline').map(m => `${m.label}(${m.ratio.toFixed(1)}%)`);
                const gro = anomalyMonths.filter(m => m.status === 'growth').map(m => `${m.label}(${m.ratio.toFixed(1)}%)`);
                let at = '';
                if (dec.length > 0) at += `⚠️ <strong>大幅減少</strong>: ${dec.join(', ')}<br>`;
                if (gro.length > 0) at += `📈 <strong>大幅伸長</strong>: ${gro.join(', ')}`;
                html += `<p class="text-[11px] text-slate-500 bg-slate-50 p-3 rounded-xl border border-slate-100 leading-normal">${at}</p>`;
            } else {
                html += `<p class="text-[11px] text-slate-500 bg-slate-50 p-3 rounded-xl border border-slate-100 leading-normal">大幅な乖離（±20%以上）は検出されず、安定した推移です。</p>`;
            }

            // 内訳比較
            if (details && details.length > 1) {
                let detailAnalyses = [];
                details.forEach(d => {
                    const dA = aggregate(slicedA, d.c.slice(sIdxA, eIdxA + 1), selection.granularity);
                    const dB = aggregate(slicedB, d.c.slice(sIdxB, eIdxB + 1), selection.granularity);
                    const dATotal = dA.reduce((s, v) => s + v, 0);
                    const dBTotal = dB.reduce((s, v) => s + v, 0);
                    const dRatio = dBTotal > 0 ? (dATotal / dBTotal) * 100 : 0;
                    if (dA.some(v => v !== 0) || dB.some(v => v !== 0)) {
                        detailAnalyses.push({ label: d.label, ratio: dRatio, aTotal: dATotal, bTotal: dBTotal });
                    }
                });
                if (detailAnalyses.length > 1) {
                    const valid = detailAnalyses.filter(d => d.bTotal > 0);
                    if (valid.length > 0) {
                        valid.sort((a, b) => b.ratio - a.ratio);
                        const best = valid[0], worst = valid[valid.length - 1];
                        const simplify = (lbl) => { const p = lbl.split('/').map(s => s.trim()).filter(s => s !== 'すべて' && s !== '合算' && s !== '合計'); return p.length > 0 ? p.join(' / ') : lbl; };
                        let dt = `<p class="text-[11px] text-slate-500 bg-emerald-500/5 p-3 rounded-xl border border-emerald-500/10 leading-normal mt-2">`;
                        dt += `📊 <strong>内訳比較</strong>:<br>`;
                        dt += `・最も伸長: <strong>${simplify(best.label)}</strong>（${best.ratio.toFixed(1)}%）<br>`;
                        if (best.label !== worst.label) dt += `・最も苦戦: <strong>${simplify(worst.label)}</strong>（${worst.ratio.toFixed(1)}%）`;
                        dt += `</p>`;
                        html += dt;
                    }
                }
            }

            html += `</div></div>`;

            // Advice
            let advice = '';
            if (ratio >= 100) {
                advice = `期間A（${labelA}）は期間B（${labelB}）を上回っています。成長の要因を特定し、今後の戦略に活かすことを推奨します。`;
            } else {
                advice = `期間A（${labelA}）は期間B（${labelB}）を下回っています。減少要因（市場環境、競合、商流変更等）の深掘り分析を推奨します。`;
            }
            html += `<div class="mt-6 pt-6 border-t border-slate-100 flex items-start gap-3">`;
            html += `<div class="w-8 h-8 bg-emerald-500/10 rounded-xl flex items-center justify-center text-primary shrink-0 mt-0.5"><i data-lucide="check-circle-2" class="w-4 h-4"></i></div>`;
            html += `<div class="flex-1">`;
            html += `<h4 class="text-[11px] font-black text-slate-400 uppercase tracking-wider mb-1">Recommended Action | AI推奨アクション</h4>`;
            html += `<p class="text-xs text-emerald-800 bg-emerald-500/5 px-4 py-3 rounded-2xl border border-emerald-500/10 font-bold italic">「${advice}」</p>`;
            html += `</div></div>`;

            container.innerHTML = html;
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        function renderChips(type, items) {
            const container = document.getElementById('chips-' + type);
            if (!container) return;
            container.innerHTML = items.filter(it => it).map(it => '<span class="chip">' + it + '</span>').join('');
        }

        function updateAIAnalysis(labels, cAgg, pAgg, details = [], sIdx = 0, eIdx = 0, sliced = []) {
            const container = document.getElementById('ai-analysis-content');
            if (!container) return;

            const hasData = cAgg.some(v => v !== 0) || pAgg.some(v => v !== 0);

                if (card) card.style.display = 'none';
                return;
            }
            if (card) card.style.display = 'block';

            const cTotal = cAgg.reduce((sum, v) => sum + v, 0);
            const pTotal = pAgg.reduce((sum, v) => sum + v, 0);
            const diff = cTotal - pTotal;
            const ratio = pTotal > 0 ? (cTotal / pTotal) * 100 : 0;
            const metric = selection.metric;
            const unitText = selection.unit === 0.001 ? "円" : (selection.unit === 1 ? "千円" : (selection.unit === 10 ? "万円" : (selection.unit === 1000 ? "百万円" : "千円")));

            let maxGrowthRatio = -Infinity;
            let maxGrowthLabel = '';
            let maxDeclineRatio = Infinity;
            let maxDeclineLabel = '';
            let anomalyMonths = [];

            for (let i = 0; i < labels.length; i++) {
                const cVal = cAgg[i] || 0;
                const pVal = pAgg[i] || 0;
                if (pVal > 0) {
                    const r = (cVal / pVal) * 100;
                    if (r > maxGrowthRatio) {
                        maxGrowthRatio = r;
                        maxGrowthLabel = labels[i];
                    }
                    if (r < maxDeclineRatio) {
                        maxDeclineRatio = r;
                        maxDeclineLabel = labels[i];
                    }
                    if (r < 80) {
                        anomalyMonths.push({ label: labels[i], ratio: r, diff: cVal - pVal, status: 'decline' });
                    } else if (r > 120) {
                        anomalyMonths.push({ label: labels[i], ratio: r, diff: cVal - pVal, status: 'growth' });
                    }
                }
            }

            const recentLength = Math.min(3, labels.length);
            let trendText = '';
            if (recentLength > 0) {
                let recentGrowthCount = 0;
                let recentDeclineCount = 0;
                for (let i = labels.length - recentLength; i < labels.length; i++) {
                    if ((cAgg[i] || 0) > (pAgg[i] || 0)) {
                        recentGrowthCount++;
                    } else if ((cAgg[i] || 0) < (pAgg[i] || 0)) {
                        recentDeclineCount++;
                    }
                }
                if (recentGrowthCount === recentLength) {

                    trendText = `直近の推移（${recentLength}期間）は連続して前年を下回っており、減少傾向が続いています。速やかな要因分析と対策が必要です。`;
                } else {
                    trendText = `直近の推移は前年比で一進一退の動きとなっており、概ね横ばいまたは拮抗した状況です。`;
                }
            }

            let html = `<div class="grid grid-cols-1 md:grid-cols-2 gap-6">`;
            
            html += `<div class="space-y-3">`;
            html += `<h4 class="text-[11px] font-black text-slate-400 uppercase tracking-wider">Overall Summary | 全体実績概況</h4>`;
            html += `<p class="text-xs text-slate-700">期間累計の${metric}は、当年実績 <strong>${cTotal.toLocaleString(undefined, {maximumFractionDigits: 1})} ${unitText}</strong> となり、前年実績 <strong>${pTotal.toLocaleString(undefined, {maximumFractionDigits: 1})} ${unitText}</strong> に対し、前年比 <strong>${ratio.toFixed(1)}%</strong> （差額: ${diff >= 0 ? '+' : ''}${diff.toLocaleString(undefined, {maximumFractionDigits: 1})} ${unitText}）で推移しています。</p>`;
            html += `<p class="text-xs text-slate-600">${trendText}</p>`;
            html += `</div>`;

            html += `<div class="space-y-3">`;
            html += `<h4 class="text-[11px] font-black text-slate-400 uppercase tracking-wider">Key Indicators & Anomalies | 特異点の検出</h4>`;
            
            let keyPoints = [];

                keyPoints.push(`最も伸長した期間は <strong>${maxGrowthLabel}</strong>（前年比: <strong>${maxGrowthRatio.toFixed(1)}%</strong>）です。`);
            }
            if (maxDeclineRatio < Infinity && maxDeclineRatio < 100) {
                keyPoints.push(`最も落ち込んだ期間は <strong>${maxDeclineLabel}</strong>（前年比: <strong>${maxDeclineRatio.toFixed(1)}%</strong>）です。`);
            }
            
            if (keyPoints.length > 0) {
                html += `<p class="text-xs text-slate-700">${keyPoints.join('<br>')}</p>`;
            }

            if (anomalyMonths.length > 0) {
                const declines = anomalyMonths.filter(m => m.status === 'decline').map(m => `${m.label}(${m.ratio.toFixed(1)}%)`);
                const growths = anomalyMonths.filter(m => m.status === 'growth').map(m => `${m.label}(${m.ratio.toFixed(1)}%)`);
                
                let anomalyText = '';

                    anomalyText += `⚠️ <strong>大幅な前年割れ期間</strong>: ${declines.join(', ')}<br>`;
                }
                if (growths.length > 0) {
                    anomalyText += `📈 <strong>大幅な伸長期間</strong>: ${growths.join(', ')}`;

                html += `<p class="text-[11px] text-slate-500 bg-slate-50 p-3 rounded-xl border border-slate-100 leading-normal">${anomalyText}</p>`;

                html += `<p class="text-[11px] text-slate-500 bg-slate-50 p-3 rounded-xl border border-slate-100 leading-normal">前年実績から大幅に乖離（±20%以上）した特異期間は検出されておらず、安定した推移です。</p>`;

            // 内訳の比較ロジックを追加
            if (details && details.length > 1 && sliced && sliced.length > 0) {
                let detailAnalyses = [];
                details.forEach(d => {
                    const detailC = aggregate(sliced, d.c.slice(sIdx, eIdx + 1), selection.granularity);
                    const detailP = aggregate(sliced, d.p.slice(sIdx, eIdx + 1), selection.granularity);
                    const dCTotal = detailC.reduce((sum, v) => sum + v, 0);
                    const dPTotal = detailP.reduce((sum, v) => sum + v, 0);

                    const hasC = detailC.some(v => v !== 0);
                    const hasP = detailP.some(v => v !== 0);

                        detailAnalyses.push({ label: d.label, ratio: dRatio, cTotal: dCTotal, pTotal: dPTotal });

                });

                if (detailAnalyses.length > 1) {
                    const validDetails = detailAnalyses.filter(d => d.pTotal > 0);

                        validDetails.sort((a, b) => b.ratio - a.ratio);
                        const best = validDetails[0];

                            const parts = lbl.split('/').map(p => p.trim());
                            const cleanParts = parts.filter(p => p !== 'すべて' && p !== '合算' && p !== '合計');
                            return cleanParts.length > 0 ? cleanParts.join(' / ') : lbl;
                        };

                        const bestLabel = simplifyLabel(best.label);
                        const worstLabel = simplifyLabel(worst.label);

                        let detailSummaryText = `<p class="text-[11px] text-slate-500 bg-emerald-500/5 p-3 rounded-xl border border-emerald-500/10 leading-normal mt-2">`;
                        detailSummaryText += `📊 <strong>内訳の比較分析</strong>:<br>`;
                        detailSummaryText += `・最も伸長したのは <strong>${bestLabel}</strong>（前年比: <strong>${best.ratio.toFixed(1)}%</strong>）です。<br>`;
                        if (best.label !== worst.label) {
                            detailSummaryText += `・最も苦戦したのは <strong>${worstLabel}</strong>（前年比: <strong>${worst.ratio.toFixed(1)}%</strong>）です。`;
                        }
                        detailSummaryText += `</p>`;
                        html += detailSummaryText;
                    }

        function getWeekLabel(dateStr) {
            const parts = dateStr.split('-');
            const d = new Date(parts[0], parts[1]-1, parts[2]);
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1);
            const monday = new Date(d.setDate(diff));
            const m = String(monday.getMonth() + 1).padStart(2, '0');
            const dayNum = String(monday.getDate()).padStart(2, '0');
            return `${m}/${dayNum}週`;
        }

        function aggregateLabels(t, g) { 
            if (g === 'day') return t;
            if (g === 'week') return [...new Set(t.map(d => getWeekLabel(d)))];
            return [...new Set(t.map(d => d.substring(0, 7)))];
        }
        
        function aggregate(t, v, g) {
            const lbs = aggregateLabels(t, g), res = {}; lbs.forEach(l => res[l] = 0);
            for(let i=0; i<t.length; i++) { 
                let k = t[i];
                if (g === 'month') k = t[i].substring(0, 7);
                else if (g === 'week') k = getWeekLabel(t[i]);
                res[k] += v[i] || 0; 
            }
            return lbs.map(l => res[l]);
        }

        window.exportCSV = function() {
            const h = document.getElementById('tableHeader');
            const b = document.getElementById('tableBody');
            if (!h || !b) return;
            
            const rows = [];
            
            // ヘッダー行の作成
            const headerCells = h.querySelectorAll('th');
            const headerRow = [];
            headerCells.forEach(cell => {
                let text = cell.textContent.split('\n')[0].trim();
                headerRow.push('"' + text.replace(/"/g, '""') + '"');
            });
            rows.push(headerRow.join(','));
            
            // ボディ行の作成
            const bodyRows = b.querySelectorAll('tr');
            bodyRows.forEach(tr => {
                const cells = tr.querySelectorAll('td');
                const row = [];
                cells.forEach((cell, idx) => {
                    let text = cell.textContent.split('\n')[0].trim();
                    if (idx > 0) {
                        text = text.replace(/,/g, '');
                        if (text === '-') text = '0';
                    }
                    row.push('"' + text.replace(/"/g, '""') + '"');
                });
                rows.push(row.join(','));
            });
            
            const csvContent = "\uFEFF" + rows.join('\r\n');
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", '実績データ_' + new Date().toISOString().substring(0, 10) + '.csv');
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

            // 6. 非同期画像の読み込み完了とレイアウトの確定を待ってからPDF出力
            const imgLoad = new Promise((resolve) => {
                if (img.complete) {
                    resolve();
                } else {
                    img.onload = resolve;
                    img.onerror = resolve; // 失敗時も進める
                }
            });

            // ブラウザの再描画・レイアウト確定を待つためのディレイ
            const delay = new Promise((resolve) => setTimeout(resolve, 350));

            Promise.all([imgLoad, delay]).then(() => {
                return html2canvas(printArea, {
                    scale: 2.0,
                    useCORS: true,
                    logging: false,
                    width: 1600,
                    windowWidth: 1600,
                    scrollX: 0,
                    scrollY: 0,
                    x: 0,
                    y: 0
                });
            }).then(canvas => {
                const imgData = canvas.toDataURL('image/jpeg', 0.98);
                const { jsPDF } = window.jspdf || window;
                const pdf = new jsPDF({
                    orientation: 'landscape',
                    unit: 'mm',
                    format: 'a4'
                });

                const a4Width = 297;
                const a4Height = 210;
                const canvasRatio = canvas.width / canvas.height;
                const a4Ratio = a4Width / a4Height;

                let w, h, x, y;
                if (canvasRatio > a4Ratio) {
                    // Canvas is wider than A4 ratio -> fit to width
                    w = a4Width;
                    h = a4Width / canvasRatio;
                    x = 0;
                    y = (a4Height - h) / 2; // Center vertically
                } else {
                    // Canvas is taller than A4 ratio -> fit to height
                    h = a4Height;
                    w = a4Height * canvasRatio;
                    x = (a4Width - w) / 2; // Center horizontally
                    y = 0;
                }

                pdf.addImage(imgData, 'JPEG', x, y, w, h);
                pdf.save('実績分析レポート_' + new Date().toISOString().substring(0, 10) + '.pdf');

                // 後処理
                document.body.removeChild(printArea);
                document.body.removeChild(loadingOverlay);
                window.scrollTo(originalScrollX, originalScrollY);
            }).catch(err => {
                console.error(err);
                alert("PDFの出力に失敗しました。");
                if (document.body.contains(printArea)) {
                    document.body.removeChild(printArea);
                }
                if (document.body.contains(loadingOverlay)) {
                    document.body.removeChild(loadingOverlay);
                }
                window.scrollTo(originalScrollX, originalScrollY);
            });
        };

        window.onload = init;
    </script>
</body>
