<!DOCTYPE html>
<html lang="ja" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Hub | Kanagawa DX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=Noto+Sans+JP:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'Noto Sans JP', 'sans-serif'] },
                    colors: { emerald: { 500: '#10b981' }, slate: { 950: '#020617' } }
                }
            }
        }
    </script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s; }
        .drop-zone { border: 2px dashed rgba(255, 255, 255, 0.1); transition: all 0.3s; }
        .drop-zone.active { border-color: #10b981; background: rgba(16, 185, 129, 0.05); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>

<body class="bg-slate-950 text-slate-200 min-h-screen font-sans">
    <header class="h-20 glass sticky top-0 z-50 flex items-center justify-between px-10 border-b border-white/5">
        <div class="flex items-center gap-6">
            <a href="master_dashboard.html" class="p-2 hover:bg-white/5 rounded-full transition-all">
                <i data-lucide="layout-grid" class="w-5 h-5 text-emerald-500"></i>
            </a>
            <div class="h-8 w-px bg-white/10"></div>
            <div>
                <h1 class="text-lg font-black tracking-tighter uppercase">Data <span class="text-emerald-500">Management Hub</span></h1>
                <p class="text-[8px] font-bold text-slate-500 tracking-[0.3em] leading-none uppercase">Marketing Section | Kanagawa Branch</p>
            </div>
        </div>
    </header>

    <div class="max-w-6xl mx-auto p-10 space-y-12">
        <!-- Introduction -->
        <section class="space-y-4">
            <h2 class="text-4xl font-black text-white tracking-tight">要因データのカスタム投入</h2>
            <p class="text-slate-400 font-medium">CSVファイルをアップロードして、新しい分析軸をダッシュボードに追加します。</p>
        </div>

        <div class="grid grid-cols-12 gap-10">
            <!-- Drop Zone Area -->
            <div class="col-span-12 lg:col-span-7 space-y-6">
                <div id="drop-zone" class="drop-zone rounded-[2.5rem] p-16 flex flex-col items-center justify-center text-center space-y-6">
                    <div class="p-6 bg-emerald-500/10 rounded-3xl">
                        <i data-lucide="upload-cloud" class="w-12 h-12 text-emerald-500"></i>
                    </div>
                    <div>
                        <p class="text-lg font-bold text-white">CSVファイルをここにドラッグ＆ドロップ</p>
                        <p class="text-sm text-slate-500 mt-2">またはクリックしてファイルを選択</p>
                    </div>
                    <input type="file" id="file-input" class="hidden" accept=".csv">
                </div>

                <!-- Preview Area -->
                <div id="preview-area" class="hidden glass-card rounded-[2rem] p-10 space-y-8 animate-fade-in">
                    <div class="flex items-center justify-between">
                        <h3 class="text-sm font-black text-white uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="eye" class="w-4 h-4 text-emerald-500"></i> 取り込みプレビュー
                        </h3>
                        <span id="file-name-label" class="text-[10px] font-bold text-slate-500">filename.csv</span>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-6">
                        <div class="p-4 rounded-2xl bg-white/5 border border-white/5">
                            <p class="text-[9px] font-black text-slate-500 uppercase mb-1">判別された月</p>
                            <input type="month" id="target-month" class="bg-transparent border-none text-white font-bold outline-none">
                        </div>
                        <div class="p-4 rounded-2xl bg-white/5 border border-white/5">
                            <p class="text-[9px] font-black text-slate-500 uppercase mb-1">検出された支社数</p>
                            <p id="branch-count" class="text-xl font-black text-white">0 <span class="text-[10px] text-slate-500">Branches</span></p>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <p class="text-[10px] font-black text-slate-500 uppercase">追加される分析項目 (要因)</p>
                        <div id="detected-factors" class="flex flex-wrap gap-2">
                            <!-- JS Dynamic -->
                        </div>
                    </div>

                    <button id="upload-btn" class="w-full py-4 bg-emerald-500 hover:bg-emerald-600 text-white rounded-2xl font-black transition-all shadow-xl shadow-emerald-500/20">
                        クラウドへ取り込む
                    </button>
                </div>
            </div>

            <!-- Current Factors List -->
            <div class="col-span-12 lg:col-span-5 space-y-6">
                <div class="glass-card rounded-[2rem] p-8 space-y-8">
                    <h3 class="text-sm font-black text-white uppercase tracking-widest flex items-center gap-2">
                        <i data-lucide="list" class="w-4 h-4 text-amber-500"></i> 登録済みの要因一覧
                    </h3>
                    <div id="current-factors" class="space-y-2 max-h-[500px] overflow-y-auto custom-scrollbar pr-2">
                        <!-- JS Dynamic -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Processing Overlay -->
    <div id="process-overlay" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-slate-950/90 backdrop-blur-md hidden">
        <div class="relative w-20 h-20 mb-8">
            <div class="absolute inset-0 border-4 border-emerald-500/20 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
        <p class="text-xl font-bold text-white">Syncing to Cloud...</p>
        <p id="process-status" class="text-sm text-slate-500 mt-2 tracking-widest uppercase">Uploading Data Patterns</p>
    </div>

    <script>
        const PROJECT_ID = "cominet-8799b", DATABASE_ID = "cominets";
        const BASE_URL = `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/${DATABASE_ID}/documents`;
        
        let currentMetadata = {}, parsedData = null;

        async function init() {
            lucide.createIcons();
            const res = await fetch(`${BASE_URL}/dashboard_metadata/current`);
            const data = await res.json();
            currentMetadata = fromFirestoreValue({ mapValue: { fields: data.fields } });
            renderCurrentFactors();
        }

        function fromFirestoreValue(v) {
            if (!v) return null;
            if (v.stringValue) return v.stringValue;
            if (v.integerValue) return parseInt(v.integerValue);
            if (v.doubleValue) return parseFloat(v.doubleValue);
            if (v.arrayValue) return v.arrayValue.values ? v.arrayValue.values.map(fromFirestoreValue) : [];
            if (v.mapValue) {
                let res = {}; for (let k in v.mapValue.fields) res[k] = fromFirestoreValue(v.mapValue.fields[k]);
                return res;
            }
            return null;
        }

        function renderCurrentFactors() {
            const container = document.getElementById('current-factors');
            const factors = currentMetadata.factorTypes || [];
            container.innerHTML = factors.map(f => `
                <div class="p-4 rounded-xl bg-white/5 border border-white/5 flex items-center justify-between group">
                    <span class="text-[10px] font-bold text-slate-300">${f}</span>
                    <i data-lucide="check" class="w-3 h-3 text-emerald-500"></i>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // Drop Zone Logic
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');

        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('active'); };
        dropZone.ondragleave = () => dropZone.classList.remove('active');
        dropZone.ondrop = (e) => { e.preventDefault(); dropZone.classList.remove('active'); handleFile(e.dataTransfer.files[0]); };
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (!file) return;
            document.getElementById('file-name-label').textContent = file.name;
            
            // Try to guess month from filename
            const match = file.name.match(/(\d{6})/);
            if (match) document.getElementById('target-month').value = `${match[1].substring(0,4)}-${match[1].substring(4,6)}`;
            else document.getElementById('target-month').value = "2026-04";

            Papa.parse(file, {
                header: true,
                dynamicTyping: true,
                complete: function(results) {
                    processParsedData(results.data);
                }
            });
        }

        const BRANCH_MAP = { "85371": "神奈川支社", "85341": "埼玉支社", "85351": "千葉支社", "85311": "東京統括支社" };

        function processParsedData(data) {
            // Clean keys
            const keys = Object.keys(data[0] || {}).map(k => k.trim().replace(/"/g, ''));
            const branchCol = keys.find(k => k.includes("支社コード") || k.includes("管轄"));
            const valueCols = keys.filter(k => typeof data[0][k] === 'number' && !k.includes("コード") && !k.includes("系列"));
            
            parsedData = { rows: data, branchCol, valueCols };
            
            const branches = [...new Set(data.map(r => r[branchCol]))].filter(b => b);
            document.getElementById('branch-count').textContent = branches.length;
            
            const factorsContainer = document.getElementById('detected-factors');
            factorsContainer.innerHTML = valueCols.map(v => `<span class="px-3 py-1 bg-emerald-500/10 text-emerald-500 rounded-full text-[9px] font-black uppercase tracking-widest border border-emerald-500/20">${v}</span>`).join('');
            
            document.getElementById('preview-area').classList.remove('hidden');
        }

        // Upload Logic
        document.getElementById('upload-btn').onclick = async () => {
            const month = document.getElementById('target-month').value;
            if (!month) { alert("月を選択してください。"); return; }
            
            document.getElementById('process-overlay').classList.remove('hidden');
            
            try {
                // In a pure browser app, we can't get the Service Account token easily.
                // We'll try to PATCH directly. If security rules allow 'if true', it works.
                const branches = [...new Set(parsedData.rows.map(r => r[parsedData.branchCol]))].filter(b => b);
                
                for (let bCode of branches) {
                    const bName = BRANCH_MAP[bCode] || `Code_${bCode}`;
                    const branchRows = parsedData.rows.filter(r => r[parsedData.branchCol] === bCode);
                    
                    const summary = {};
                    parsedData.valueCols.forEach(col => {
                        summary[col] = branchRows.reduce((acc, row) => acc + (row[col] || 0), 0);
                    });
                    
                    const doc_id = `${bName}_${month}`.replace(/\//g, "-");
                    await uploadToFirestore("dashboard_factors", doc_id, {
                        m: month, b: bName, s: summary, updatedAt: new Date().toISOString()
                    });
                }
                
                // Update Metadata
                const newFactors = [...new Set([...(currentMetadata.factorTypes || []), ...parsedData.valueCols])];
                await uploadMetadata({ factorTypes: newFactors });
                
                alert("取り込みが完了しました！");
                location.reload();
            } catch (e) {
                console.error(e);
                alert("エラーが発生しました。セキュリティルールや通信環境を確認してください。\n" + e.message);
            } finally {
                document.getElementById('process-overlay').classList.add('hidden');
            }
        };

        async function uploadToFirestore(collection, doc_id, data) {
            const url = `${BASE_URL}/${collection}/${doc_id}`;
            const fields = {};
            for (let k in data) fields[k] = toFirestoreValue(data[k]);
            
            const res = await fetch(url + "?updateMask.fieldPaths=" + Object.keys(data).join("&updateMask.fieldPaths="), {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fields })
            });
            if (!res.ok) throw new Error(await res.text());
        }

        async function uploadMetadata(data) {
            const fields = {};
            for (let k in data) fields[k] = toFirestoreValue(data[k]);
            const res = await fetch(`${BASE_URL}/dashboard_metadata/current?updateMask.fieldPaths=factorTypes`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fields })
            });
        }

        function toFirestoreValue(val) {
            if (typeof val === 'number') return { doubleValue: val };
            if (typeof val === 'string') return { stringValue: val };
            if (Array.isArray(val)) return { arrayValue: { values: val.map(toFirestoreValue) } };
            if (typeof val === 'object') {
                const fields = {}; for (let k in val) fields[k] = toFirestoreValue(val[k]);
                return { mapValue: { fields } };
            }
            return { nullValue: null };
        }

        init();
    </script>
</body>
</html>
